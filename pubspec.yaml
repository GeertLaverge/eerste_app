name: eerste_app
description: Eerste Flutter applicatie
publish_to: 'none'

version: 1.0.0+8

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  shared_preferences: ^2.5.3
  intl: ^0.20.2
  google_fonts: ^6.2.1

  # OneDrive login + API
  flutter_appauth: ^8.0.3
  http: ^1.3.0

  # PDF generatie
  pdf: ^3.11.1

  # Bestanden opslaan
  path_provider: ^2.1.4

  # PDF openen
  open_filex: ^4.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/thimaco_logo_icon.png